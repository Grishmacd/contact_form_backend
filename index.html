<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link
rel="stylesheet"
href="style.css">

</head>


<body>


<div class="container">


<div class="contact-box">


<div class="left">

<h1>
Let's Talk 👋
</h1>

<p>
Have an idea or project?
Send me a message.
</p>


<form id="contactForm">


<input
type="text"
id="name"
placeholder="Your Name"
required>



<input
type="email"
id="email"
placeholder="Your Email"
required>



<textarea
id="message"
placeholder="Write message..."
required>

</textarea>



<button
type="submit">

Send Message

</button>


</form>


</div>



<div class="right">

<h2>
Get in Touch
</h2>

<p>

Usually replies within 24 hrs

</p>

<div class="circle"></div>

</div>



</div>


</div>


<script src="script.js"></script>

</body>
</html>
